<!DOCTYPE html>
<html>

<head>
    <title>Weather Dashboard</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        .weather-box {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            width: 300px;
        }

        pre {
            background: #f5f5f5;
            padding: 10px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <h1>Weather Dashboard</h1>

    <label for="citySelect">Select city:</label>

    <select id="citySelect">
        <option value="51.34,12.37">Leipzig</option>
        <option value="52.52,13.41">Berlin</option>
        <option value="48.14,11.58">Munich</option>
    </select>

    <button id="loadWeather">Load Weather</button>
    <button id="useLocation">Use My Location</button>

    <div class="weather-box">
        <p>Temperature: <span id="temp">-</span></p>
        <p>Wind speed: <span id="wind">-</span></p>
        <p>Weather code: <span id="code">-</span></p>
    </div>

    <h3>Stored Weather JSON</h3>
    <pre id="jsonOutput"></pre>

    <script src="script.js"></script>
    <script src="preparation.js"></script>


</body>

</html>
